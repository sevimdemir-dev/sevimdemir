<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyorsunuz...</title>
    
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="loading-text">Instagram Uygulamasına Yönlendiriliyorsunuz...</div>

    <script>
        window.onload = function() {
            // UYGULAMAYI DOĞRUDAN TETİKLEYEN DEEP LINK (DEEP LINK PROTOKOLÜ)
            var appUrl = "instagram://direct_share?username=sevim.demir.tff";
            // YEDEK TARAYICI LINKI
            var webUrl = "https://ig.me/m/sevim.demir.tff";

            // Önce doğrudan telefondaki Instagram uygulamasını açmayı dene
            window.location.href = appUrl;

            // Eğer 300 milisaniye içinde uygulama açılmazsa (çünkü bazı cihazlar engelleyebilir), yedek linki devreye sok
            setTimeout(function() {
                window.location.replace(webUrl);
            }, 300);
        };
    </script>

</body>
</html>
